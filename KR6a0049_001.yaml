body:
  text: 西晉沙門法炬譯聞如是一時婆伽婆在婆祇尸收摩林鼻量鹿野苑中彼時尊者舍利弗告諸比丘諸賢世間有四種人現可知云何為四此諸賢或有人內有求欲彼內有求欲不知如真此諸賢或有人內有求欲彼內有求欲知如真此諸賢或有人內無求欲彼內無求欲不知如真此諸賢或有人內無求欲彼內無求欲知如真此諸賢或彼一人內有求欲彼內有求欲不知如真者我説此人之人最弊惡此諸賢或有人內有求欲彼內有求欲知如真者我説此人之人最勝此諸賢或有人內無求欲彼內無求欲不知如真者我説此人之人最弊惡此諸賢或有人內無求欲彼內無求欲知如真者我説此人之人最勝彼時有異比丘從座起一向著衣叉手向尊者舍利弗白尊者舍利弗曰云何尊者舍利弗何因何緣此前二種人俱有求欲俱有著意説一人弊惡説一人最勝耶復何因何緣此後二種人俱有無求欲俱有無著説一人弊惡説一人最勝耶此諸賢或有一人內有求欲彼內有求欲不知如真者當知彼亦無樂行亦無進行亦無精進彼住求欲彼求欲意著命終彼求欲意著命終已亦不善終亦不生善處何以故彼求欲著意終故猶若諸賢有人若在販肆若在客作家若持銅鉢來垢穢不淨彼持來已亦不隨時洗拭亦不隨時拭亦不隨時摩但著塵土中如是此銅鉢但增上受垢穢如是諸賢或有一人內有求欲彼內有求欲不知如真當知彼亦不樂行亦不進行亦不精進彼但住求欲彼內求著意命終內求著意命終已終亦不善亦不生善處何以故彼內求著求欲命終故此諸賢或有人內求欲彼內求欲知如真當知彼樂行精進彼求欲止彼無求欲意不著命終彼無求欲意不著命終已終亦善所生處亦善何以故彼無求欲無著意故猶若諸賢有人若販肆客作家持銅鉢來垢穢不淨彼持來已隨時洗隨時拭隨時摩不著塵土中此銅鉢於後時清淨白如是諸賢或有人內有求欲彼內求欲知如真當知彼樂行進行精進彼求欲斷無有求欲意不著命終彼無有求欲意不著命終已終亦善亦生善處何以故彼無求欲無著意命終故此諸賢或有人內無求欲彼內無求欲不知如真者當知彼不能護眼耳意法住彼不能護眼耳意法已意有淫欲彼雜欲雜求著意命終彼雜欲雜求著意命終已終亦不善生亦不善何以故雜欲雜求意著命終故猶若諸賢有人若販肆客作家持清淨銅鉢來持來已亦不隨時洗亦不隨時拭亦不隨時摩著塵土中如是此銅鉢於後時垢穢不淨如是諸賢或有人內無求欲彼內無求欲不知如真當知彼不能護眼耳意法彼不能護眼耳意法已有淫欲意雜欲意雜欲雜求著意命終彼雜欲雜求著意命終已終亦不善生亦不善何以故彼雜欲雜求著意命終故此諸賢或有人內無求欲彼內無求欲知如真當知彼能護眼耳意法彼護眼耳意法已亦無欲意無欲無求意無著命終彼無欲無求無著意命終已終亦善生亦善何以故無求無欲意無著命終故猶若諸賢有人若販肆客作家持清淨銅鉢來持來已隨時洗隨時拭隨時摩不著塵土中如是此鉢增上清淨白如是諸賢彼人亦如是內無求欲彼內無求欲知如真當知彼能護眼耳意法彼護眼耳意法已無有淫欲彼無雜欲求無著意命終彼無雜欲雜求無著意命終已終亦善生亦善何以故彼無雜欲無雜求無意著命終故是為諸賢所因所緣命此初二種人求欲著意説一人弊惡説一人最勝是為所因所緣此後二種人內無求欲意無著説一人弊惡説一人最勝彼時有異比丘從座起一向著衣叉手向尊者舍利弗白尊者舍利弗曰云何尊者舍利弗名求欲求欲者何以故名為求欲諸賢以求欲無量諸惡法故名為求欲此諸賢或有人有求欲生少有所犯不令他知而有所犯諸賢可知是處彼人所犯他知此意恚此諸賢若彼恚已欲有所行但有不善此諸賢或有人少有求欲生而有所犯但私語他不在衆中是彼所犯諸賢可知是處彼人所犯衆中説不在獨處在衆中説彼意恚此諸賢彼意恚已欲有所行但有不善此諸賢或有人有所犯欲語等已人不語不等已人有所犯諸賢可知是處謂彼人所犯語不等人有所犯語不等人是彼所犯是意恚此諸賢彼意恚已若欲有所行但有不善此諸賢或有人有求欲生我當坐世尊前我當問世尊為諸比丘説法不令餘比丘在世尊前問世尊已為諸比丘説法諸賢可知是處有餘比丘坐世尊前問世尊已能為諸比丘説法是彼意恚此諸賢意恚已欲有所行但有不善此諸賢或有人有求欲生若比丘所入處令我在前行不令餘比丘比丘所入處在前行諸賢可知是處比丘所入處異比丘在前行是比丘所入處異比丘在前行已有異比丘在比丘前行是意恚此諸賢彼意恚已欲有所行但有不善此諸賢或有人求欲生此諸比丘入內已最在前坐在前受水在前受摶食不欲令餘比丘諸比丘入內已前坐前受水前受摶食諸賢可知是處有異比丘諸比丘入已最在前坐前受水前受摶食彼異比丘諸比丘入已在前坐前受水前受摶食是彼意恚彼意恚已欲有所行但有不善此諸賢或有求欲生諸比丘食已收攝鉢器令為居士説法勸進教授等教授等令歡喜不令餘比丘諸比丘食已收攝鉢器為居士説法勸進教授等教授等令歡喜諸賢可知是處有餘比丘諸比丘食已收攝鉢器至令歡喜是彼餘比丘諸比丘食已收攝鉢器至令歡喜彼意恚已此諸賢欲有所行但有不善此諸賢或有人有求欲生若居士入園令我共居士談論論語不令餘比丘居士入園共居士談論論語諸賢可知是處有異比丘居士入園已共談論論語是彼餘比丘居士入園已而共談論論語是彼意恚此諸賢彼意恚已彼欲有所行但有不善此諸賢或有人有求欲生令王大臣婆羅門居士非是一人悉令識我不欲令餘比丘王大臣婆羅門居士非是一人諸賢可知是處彼餘比丘為王大臣所識及婆羅門居士非是一人是彼餘比丘為王大臣所識及婆羅門居士非是一人彼意恚此諸賢彼意恚已欲有所行但有不善此諸賢或有人有求欲生令我於四部衆比丘比丘尼優婆塞優婆夷得供養莫令餘比丘於四部衆比丘比丘尼優婆塞優婆夷得供養諸賢可知是處有餘比丘於四部衆比丘比丘尼優婆塞優婆夷得供養是彼餘比丘於四部衆比丘比丘尼優婆塞優婆夷得供養彼意恚此諸賢彼意恚已欲有所行但有不善此諸賢或有人有求欲生令我得衣被床臥病瘦醫藥莫令餘比丘得衣被床臥病瘦醫藥諸賢可知是處餘比丘得衣被床臥病瘦醫藥是彼餘比丘得衣被床臥病瘦醫藥彼意恚此諸賢彼意恚已欲有所行但有不善此諸賢或有人亦如是有智慧梵行者當捨此無量諸惡不善求欲行當莫行此若與非沙門俱為沙門行若與非智慧沙門俱為智慧沙門不應求上座而求上座無有定而言有定與不淨俱而言有淨諸賢如是彼於智慧梵行者有如此無量諸惡不善行知有此行知與非沙門俱為非沙門與非智慧沙門俱知非智慧沙門俱不應求上座如是求上座無有定知無定與不淨俱知不淨猶若諸賢有人若販肆客作家持銅鉢來滿中不淨復以一鉢覆其上若持至人聚中彼多人見已欲食欲得不知有不淨若彼聚人持至一處發其器若有欲食者便不欲食豈復彼持者欲食之如是諸賢有人智慧梵行者作如此無量諸惡不善與非沙門俱為沙門行與非智慧沙門俱為智慧沙門不應求上座而求上座無有定言有定與不淨俱而言有淨諸賢彼人如是於智慧梵行者如是無量諸惡不善法知有與非沙門俱是非沙門與非智慧沙門俱是非智慧沙門不應求上座求上座與不定俱是非定與不淨俱是非淨諸賢如是彼人當莫親近當莫恭敬當莫承事比丘不親近恭敬者若恭敬者禮事者若禮事者彼於長夜但有失無饒益苦與惡趣相應是故諸賢如是人當莫親近當莫恭敬禮事此諸賢或有人無求欲生有所犯不欲令他知而有所犯諸賢可知是處彼人所犯若他知有犯他人知已此意無恚此諸賢意無恚已欲有所行但有善此諸賢或有人無求欲生而有所犯向他説不向衆有所犯諸賢可知是處謂彼人所犯有向衆中説不獨向他説有所犯向衆中説此意不恚此諸賢意不恚已欲有所行但有善此諸賢或有人無求欲生有所犯語等已人不語非等已人有所犯諸賢可知此處謂彼人所犯語非等已人不語等已人有所犯語非等已人此意無恚此諸賢意不恚已欲有所行但有善此諸賢或有人無求欲生我坐世尊前已問世尊世尊當為諸比丘説法不欲令他比丘坐世尊前問世尊世尊為諸比丘説法諸賢可知是處有異比丘在世尊前世尊為諸比丘説法有餘比丘在世尊前問世尊世尊為諸比丘説法此意不恚此諸賢若意不恚已欲有所行但有善此諸賢或有人無求欲生比丘有所至在前行行令餘比丘在前在前行彼餘比丘有所至莫令餘比丘在前行諸賢可知是處有餘比丘諸比丘有所至在前行是餘比丘比丘有所至在前行彼意無恚此諸賢意不恚已欲有所行但有善此諸賢或有人無求欲生比丘入內已我在前受水受摶食莫令餘比丘比丘入內已最在前坐受水受摶食諸賢可知是處有餘比丘比丘入內已最在前坐受水受摶食此意無恚此諸賢意不恚已欲有所行但有善此諸賢或有人無求欲生諸比丘食已收攝鉢器令我為居士説法教授勸進等教授等令歡喜莫令餘比丘諸比丘食已收攝鉢器為居士説法教授勸進等教授等令歡喜諸賢可知是處有餘比丘諸比丘食已收攝鉢器為居士説法勸進教授等教授等令歡喜此意無恚諸賢彼無恚意已欲有所行但有善此諸賢或有人無求欲生居士入園已我共談論莫令餘比丘居士入園已共談論諸賢可知是處有餘比丘居士入園已共談論餘比丘居士入園已共談論此意不恚此諸賢彼意無恚已欲有所行但有善此諸賢或人無求欲生令王大臣婆羅門居士非一人所識莫令餘比丘王大臣婆羅門居士非一人所識諸賢可知是處有餘比丘王大臣婆羅門居士非一人所識有餘比丘為王大臣婆羅門居士非一人所識此意無恚此諸賢彼意無恚已欲有所行但有善此諸賢或有人無求欲生令我於四部衆比丘比丘尼優婆塞優婆夷得供養莫令餘比丘於四部衆比丘比丘尼優婆塞優婆夷得供養諸賢可知是處有餘比丘於四部衆比丘比丘尼優婆塞優婆夷得供養此意無恚此諸賢意無恚已欲有所行但有善此諸賢或有人無求欲生令我得衣被床臥病瘦醫藥不欲令餘比丘得衣被床臥病瘦醫藥諸賢可知是處餘比丘得衣被床臥病瘦醫藥餘比丘得衣被床臥病瘦醫藥此意不恚此諸賢意不恚已欲有所行但有善諸賢如是彼人於智慧梵行者樂無量諸善法行若不知共沙門俱而言非沙門共智慧沙門俱而言非智慧沙門共上座俱而言不上座俱與定俱而言無定與淨俱而言不淨如是諸賢或有人於智慧梵行者如此無量諸善行悉當知與沙門俱當知與沙門俱與智慧沙門俱當知與智慧沙門俱與定俱當知與定俱與淨俱當知與淨俱猶若諸賢有人販肆客作家持銅鉢來滿中飲食種種異味以一鉢覆持至人聚中彼多人見已不用食不欲得知其非彼作是言故是前器故是前器彼持至多人聚中已而發其器彼不欲食者便欲食之豈前見者不欲食如是諸賢或有人於智慧梵行者如是無量諸善行而不能知與沙門俱言非沙門與智慧沙門俱言不智慧沙門與上座俱而言非上座與定俱而言非定與淨俱而言非淨如是諸賢或有人於智慧梵行者有無量諸善行然後知與沙門俱是沙門與智慧沙門俱是智慧沙門與上座俱知是上座與定俱知是定與淨俱知是淨如是諸賢此人當恭敬承事禮事比丘當親近當恭敬若恭敬者當承事若承事者常當應行常應行者彼於長夜但有饒益安樂是故諸賢如此人者當親近恭敬承事彼時尊者大目乾連亦在衆中會座於是大目乾連語尊者舍利弗曰尊者舍利弗我欲説喻當説不耶當説汝賢者目乾連尊者舍利弗昔時在羅閲祇耆闍崛山尊者舍利弗我晨起著衣服與衣鉢俱詣羅閲祇乞食遊羅閲祇乞食時至他巧師家我見無念滿子在他巧師家見在斫治車軸彼無念滿子在巧師家作是念生此巧師取此軸斫治是處者如是此軸為妨者為得除彼無念滿子在巧師家作是念生彼巧師者如彼所念便以斧斫治車軸彼時無念滿子即作是言此巧師為知我意而取此軸如其處斫治如是此軸為增益無妨如是尊者舍利弗謂彼人諛諂幻士無信不有信懈怠無精進意念亂無有定惡智意亂諸根不定於戒行緩不分別沙門行而尊者舍利弗知其所念而為解説尊者舍利弗謂彼人無諛諂非幻士有信信樂行精進意常定智慧學於戒恭敬多分別沙門行彼從尊者舍利弗聞説法已如快飲如快食口及意悉受持猶若尊者舍利弗若剎利女婆羅門女居士女工師女沐浴塗香著白淨衣若有人意念生慈愍欲有饒益欲令安隱若持優鉢華鬘占波華鬘婆師華鬘阿提摩多華鬘授與彼已兩手受之自冠其首如是尊者舍利弗或有人無諛諂亦無幻亦不不信有信能行精進意常定智慧恭敬學戒學多分別沙門行彼從尊者舍利弗聞法已如快飲如快食口及意亦爾此尊者舍利弗甚奇而尊者舍利弗為諸梵行者除其不善立於善中善哉賢者是為真人此各各所説相樂已從座起各還本處
